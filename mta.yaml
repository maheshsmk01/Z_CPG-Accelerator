_schema-version: 3.3.0
ID: ZCPG_Accelerator
description: A simple CAP project.
version: 1.0.0
modules:
- name: ZCPG_Accelerator-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: ZCPG_Accelerator_db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: ZCPG_Accelerator-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: ZCPG_Accelerator_db
  parameters:
    buildpack: nodejs_buildpack
- name: ZCPG_Accelerator-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ZCPG_Accelerator-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - configtable.zip
      name: configtable
      target-path: resources/
- name: configtable
  type: html5
  path: app/configtable
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: ZCPG_Accelerator_db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: ZCPG_Accelerator-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ZCPG_Accelerator-html5-service
    service-plan: app-host
- name: ZCPG_Accelerator-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: ZCPG_Accelerator-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
